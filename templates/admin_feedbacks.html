{% extends "admin_base.html" %}

{% block content %}

<div class="admin-table">
    <h2>Gerenciar Feedbacks</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Comentário</th>
            <th>Avaliação</th>
            <th>Ações</th>
        </tr>

        {% for feedback in feedbacks %}
        <tr>

            <td>{{ feedback[0] }}</td>
            <td>{{ feedback[1] }}</td>
            <td>{{ feedback[2] }}</td>
            <td>{{ feedback[3] }}/5</td>

            <td>
                <a href="/admin/excluir-feedback/{{ feedback[0] }}" class="btn-excluir"
                    onclick="return confirm('Tem certeza que deseja excluir este feedback?')">
                    Excluir
                </a>
            </td>

        </tr>
        {% endfor %}

    </table>
</div>

{% endblock %}
