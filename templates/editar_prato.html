{% extends "base.html" %}

{% block content %}

<div class="feedback-box">

    <h2>Editar prato</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label>Nome</label>

            <input type="text" name="nome" value="{{ prato[1] }}" required>
        </div>

        <div class="form-group">
            <label>Descrição</label>

            <textarea name="descricao" required>{{ prato[2] }}</textarea>
        </div>

        <div class="form-group">
            <label>Preço</label>

            <input type="number" step="0.01" name="preco" value="{{ prato[3] }}" required>
        </div>

        <div class="form-group">
            <label>Categoria</label>

            <input type="text" name="categoria" value="{{ prato[4] }}" required>
        </div>

        <div class="form-group">
            <label>Imagem</label>

            <input type="file" name="imagem" required>
        </div>

        <button type="submit" class="btn">
            Salvar alterações
        </button>

    </form>

</div>

{% endblock %}
