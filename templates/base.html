<!DOCTYPE html>
<html>

<head>
    <title>PG Lounge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}">
            <span>PG Lounge</span>
        </div>
        <div class="menu">
            <a href="/">Home</a>
            <a href="/cardapio">Cardápio</a>
            <a href="/feedbacks">Feedbacks</a>
            <a href="/contato">Contato</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>© 2026 PG Lounge - Todos os direitos reservados</p>
    </footer>

        <script>
        lucide.createIcons();
    </script>

</body>

</html>
