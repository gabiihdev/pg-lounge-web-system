{% extends "base.html" %}

{% block content %}

<div class="feedback-box">

    <h2>Login Administrativo</h2>

    <form method="POST">

        <div class="form-group">
            <label>Usuário</label>
            <input type="text" name="usuario" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" required>
        </div>

        <button type="submit" class="btn">
            Entrar
        </button>

    </form>

</div>

{% endblock %}
